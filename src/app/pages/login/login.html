<div class="login-container">
  <div class="login-card">
    <h2>Login</h2>
    <form (ngSubmit)="onLogin()">
        <input type="email" placeholder="Email" [(ngModel)]="email" name="email"/>
        <input type="password" placeholder="Senha" [(ngModel)]="password" name="password"/>
        <button type="submit">Entrar</button>
    </form>

    <p class="register-text">
      Não tem conta?
      <a routerLink="/register">Cadastre-se</a>
    </p>

    <p class="error" *ngIf="errorMessage">
        {{ errorMessage }}
    </p>
  </div>
</div>
