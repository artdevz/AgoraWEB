<div class="login-container">
  <div class="login-card">
    <h2>Login</h2>
    <form (ngSubmit)="onLogin()">
        <input type="email" placeholder="Email" [(ngModel)]="email" name="email"/>

        <div class="password-field">
          <input [type]="showPassword ? 'text' : 'password'" placeholder="Senha" [(ngModel)]="password" name="password"/>
          <button type="button" class="eye-btn" (click)="togglePassword()">
            <span class="material-icons">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
          </button>
        </div>

        <button type="submit">Entrar</button>
    </form>

    <p class="register-text">
      Não tem conta?
      <a routerLink="/register">Cadastre-se</a>
    </p>

    <p class="error" *ngIf="errorMessage">
        {{ errorMessage }}
    </p>
  </div>
</div>
