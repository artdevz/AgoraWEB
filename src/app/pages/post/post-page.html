<div class="post-page" *ngIf="post">

    <div class="post-card">
        <div class="post-header">
            <h2>{{ post.title }}</h2>
            <small>{{ post.createdAt }}</small>
        </div>

        <p class="description">{{ post.description }}</p>

        <div class="actions">
            <button class="like">👍</button>
            <button class="dislike">👎</button>
        </div>
    </div>

    <div class="comment-box">
        <textarea [(ngModel)]="newComment" placeholder="Escreva um comentário..."></textarea>
        <button (click)="submitComment()">Enviar</button>
    </div>

    <div class="comments">
        <app-comment-node
            *ngFor="let comment of comments"
            [comment]="comment"
            (reply)="onReply($event)">
        </app-comment-node>
    </div>

</div>
