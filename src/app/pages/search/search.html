<div class="feed">

    <h1>Resultados para "{{ queryText }}"</h1>

    <div *ngIf="loading" class="loader"></div>

    <ng-container *ngIf="!loading">

        <p *ngIf="posts.length === 0" class="empty">
            Nenhum post encontrado.
        </p>

        <app-post-node
            *ngFor="let post of posts"
            [post]="post">
        </app-post-node>

    </ng-container>

</div>
