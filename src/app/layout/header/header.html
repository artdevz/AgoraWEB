<header class="app-header">
  <div class="header-content">

    <div class="left">
      <div class="logo" routerLink="/">ÁGORA</div>
    </div>

    <div class="center">
      <input type="text" placeholder="Buscar algo..." class="search-input">
    </div>

    <div class="right">
      <button class="create-btn" (click)="createPost()">
        <span class="plus">+</span>
        Criar
      </button>

      <button class="notifications-btn">🔔</button>

      <button class="account" (click)="toggleMenu()">
        <div class="avatar"></div>
      </button>

      <div class="dropdown" *ngIf="openMenu">
        <div class="dropdown-header">{{ nickname }}</div>

        <button (click)="goToProfile()">Perfil</button>
        <button (click)="goToSettings()">Configurações</button>
        <button (click)="toggleTheme()">Modo Claro/Escuro</button>

        <div class="divider"></div>

        <button class="logout" (click)="logout()">Sair</button>
      </div>
    </div>
  </div>
</header>
